<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuentra las Parejas - Menú</title>
    <meta name="description" content="Menú principal de Encuentra las Parejas, selecciona el idioma, número de fichas y jugadores.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="lang-switch">
            <button id="lang-es" class="lang-btn active">ES</button>
            <span class="divider">|</span>
            <button id="lang-en" class="lang-btn">EN</button>
        </div>
        <div class="theme-switch">
            <button id="theme-toggle" class="theme-btn" aria-label="Cambiar tema">
                <svg id="icon-sun" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg id="icon-moon" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>
    </header>

    <main class="container">
        <!-- Welcome View -->
        <div id="welcome-view" class="glass-panel welcome-panel">
            <div class="logo-container">
                <img src="Logo.png" alt="Encuentra la pareja Logo" class="logo-img">
            </div>
            <button id="btn-jugar-welcome" class="btn-primary btn-huge">Jugar</button>
        </div>

        <!-- Configuration View -->
        <div id="config-view" class="glass-panel config-panel hidden">
            <div class="config-header">
                <button id="btn-back-welcome" class="btn-back-arrow" aria-label="Volver al inicio">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon-back"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <h1 id="game-title" class="title">Configuración</h1>
            </div>
            
            <div class="input-group">
                <label id="lbl-cards" for="cards-input">Número de fichas</label>
                <input type="number" id="cards-input" min="6" max="40" step="2" value="16">
                <span id="error-message" class="error-message hidden">⚠ Solo se puede seleccionar un número par de fichas.</span>
            </div>

            <div class="input-group">
                <label id="lbl-players">Cantidad de jugadores</label>
                <div class="players-grid" id="players-grid">
                    <!-- Javascript generará las opciones 1-8 aquí -->
                </div>
            </div>

            <div class="input-group">
                <label id="lbl-time">Tiempo por turno</label>
                <div class="time-grid" id="time-grid">
                    <!-- Javascript generará las opciones aquí -->
                </div>
            </div>

            <button id="btn-empezar-config" class="btn-primary" disabled>Empezar</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
